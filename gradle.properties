android.enableJetifier=true
android.useAndroidX=true
org.gradle.jvmargs=-Xmx4096M
# AGP 8 defaults nonTransitiveRClass to true; this project references library
# resources through the app R class, so keep transitive R classes for now.
android.nonTransitiveRClass=false
# AGP 8 defaults nonFinalResIds to true, which breaks switch/case on R.id.*.
# Keep final resource IDs until the switches are converted to if/else.
android.nonFinalResIds=false
